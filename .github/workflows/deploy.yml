name: Deploy Nuxt to GitHub Pages

on:
  push:
    branches:
      - main  # se déclenche à chaque push sur main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # nécessaire pour pousser sur gh-pages

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Generate static site
        run: npx nuxt generate  # produit le dossier .output/public

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .output/public  # dossier généré par Nuxt